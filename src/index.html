<!doctype html>
<html lang="en" class="dark overflow-x-clip">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Eindproject</title>

        <!-- Favicon -->
        <link
            rel="icon"
            type="image/svg+xml"
            href="https://api.iconify.design/tabler/math-max-min.svg?color=%23ffffff"
        />

        <!-- Pyscript -->
        <link
            rel="stylesheet"
            href="https://pyscript.net/releases/2026.2.1/core.css"
        />
        <script
            type="module"
            src="https://pyscript.net/releases/2026.2.1/core.js"
        ></script>

        <!-- Css -->
        <link rel="stylesheet" href="./index.css" />
        <script type="module" src="./ts/basecoat.ts"></script>

        <!-- Scripts -->
        <py-script src="./py/lib.py" config="../pyscript.json"></py-script>
        <py-script src="./py/loading.py" config="../pyscript.json"></py-script>
        <py-script src="./py/sidebar.py" config="../pyscript.json"></py-script>
        <py-script
            src="./py/navigation.py"
            config="../pyscript.json"
        ></py-script>
        <py-script src="./py/theme.py" config="../pyscript.json"></py-script>
        <py-script src="./py/settings.py" config="../pyscript.json"></py-script>
    </head>
    <body class="overflow-x-clip">
        <div
            id="pyscript-loading"
            class="fixed bottom-2 left-1/2 -translate-x-1/2"
            role="status"
            aria-live="polite"
        >
            <span class="badge-secondary">
                <i
                    class="icon-[tabler--loader-2] inline-block animate-spin"
                    aria-hidden="true"
                ></i>
                Loading python
            </span>
        </div>

        <div id="app-shell" class="[--sidebar-width:14rem]">
            <aside
                id="app-sidebar"
                class="sidebar"
                data-side="left"
                data-sidebar-initialized
                aria-hidden="false"
            >
                <nav
                    class="flex h-full flex-col"
                    aria-label="Sidebar navigation"
                >
                    <div
                        class="flex items-center justify-start gap-2 px-3 pt-3"
                    >
                        <button
                            type="button"
                            class="btn-outline h-8 w-8 p-0"
                            data-sidebar-collapse
                            aria-label="Collapse sidebar"
                            aria-controls="app-sidebar"
                            aria-expanded="true"
                        >
                            <i
                                class="icon-[tabler--layout-sidebar-left-collapse] inline-block"
                                aria-hidden="true"
                            ></i>
                        </button>
                        <p
                            class="hidden items-center gap-1 text-xs opacity-70 md:flex"
                        >
                            <i
                                class="icon-[tabler--git-commit] inline-block"
                                aria-hidden="true"
                            ></i>
                            <span>__GIT_COMMIT_HASH__</span>
                        </p>
                    </div>

                    <section class="scrollbar flex-1">
                        <div role="group" aria-labelledby="sidebar-pages-label">
                            <ul>
                                <li>
                                    <a
                                        class="flex min-w-0 items-center gap-2 px-3 py-2"
                                        data-nav-link
                                        data-page-id="page-1"
                                        data-page-label="Home"
                                        href="#page-1"
                                    >
                                        <i
                                            class="icon-[tabler--home] size-4"
                                            aria-hidden="true"
                                        ></i>
                                        <span class="flex-1 truncate"
                                            >Home</span
                                        >
                                    </a>
                                </li>
                            </ul>
                            <h3 id="sidebar-pages-label">Tools</h3>
                            <ul>
                                <li>
                                    <a
                                        class="flex min-w-0 items-center gap-2 px-3 py-2"
                                        data-nav-link
                                        data-page-id="page-2"
                                        data-page-label="Lineaire Vergelijking"
                                        href="#page-2"
                                    >
                                        <i
                                            class="icon-[tabler--apps] size-4"
                                            aria-hidden="true"
                                        ></i>
                                        <span class="flex-1 truncate"
                                            >Lineaire Vergelijking</span
                                        >
                                    </a>
                                </li>
                                <li>
                                    <a
                                        class="flex min-w-0 items-center gap-2 px-3 py-2"
                                        data-nav-link
                                        data-page-id="page-3"
                                        data-page-label="Cijfer Calculator"
                                        href="#page-3"
                                    >
                                        <i
                                            class="icon-[tabler--file-text] size-4"
                                            aria-hidden="true"
                                        ></i>
                                        <span class="flex-1 truncate"
                                            >Cijfer Calculator</span
                                        >
                                    </a>
                                </li>
                                <li>
                                    <a
                                        class="flex min-w-0 items-center gap-2 px-3 py-2"
                                        data-nav-link
                                        data-page-id="page-4"
                                        data-page-label="Percentage Calculator"
                                        href="#page-4"
                                    >
                                        <i
                                            class="icon-[tabler--settings] size-4"
                                            aria-hidden="true"
                                        ></i>
                                        <span class="flex-1 truncate"
                                            >Percentage Calculator</span
                                        >
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </section>

                    <div class="mt-auto px-3 pb-3">
                        <p
                            class="flex items-center justify-center gap-1 pb-2 text-xs opacity-70 md:hidden"
                        >
                            <i
                                class="icon-[tabler--git-commit] inline-block"
                                aria-hidden="true"
                            ></i>
                            <span>__GIT_COMMIT_HASH__</span>
                        </p>

                        <div class="flex items-center gap-2">
                            <article class="card min-w-0 flex-1 rounded-md p-0">
                                <section class="p-0">
                                    <h2
                                        class="m-0 px-3 py-2 text-sm leading-tight"
                                    >
                                        Eindproject
                                    </h2>
                                </section>
                            </article>

                            <div id="sidebar-settings-menu" class="popover">
                                <button
                                    type="button"
                                    id="sidebar-settings-menu-trigger"
                                    aria-haspopup="dialog"
                                    aria-controls="sidebar-settings-panel"
                                    aria-expanded="false"
                                    aria-label="Open settings"
                                    class="btn-icon-outline"
                                >
                                    <i
                                        class="icon-[tabler--settings]"
                                        aria-hidden="true"
                                    ></i>
                                </button>
                                <div
                                    id="sidebar-settings-menu-popover"
                                    data-popover
                                    aria-hidden="true"
                                    data-side="right"
                                    data-align="end"
                                    style="margin-left: 1.25rem"
                                >
                                    <div
                                        id="sidebar-settings-panel"
                                        aria-labelledby="sidebar-settings-menu-trigger"
                                    >
                                        <div
                                            role="group"
                                            class="field"
                                            data-orientation="horizontal"
                                        >
                                            <label
                                                for="settings-placeholder-toggle"
                                                >Placeholder</label
                                            >
                                            <input
                                                id="settings-placeholder-toggle"
                                                type="checkbox"
                                                role="switch"
                                            />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>
            </aside>

            <main id="app-main" class="content-start space-y-6 p-4 md:p-6">
                <header class="flex items-start justify-between gap-4">
                    <button
                        type="button"
                        class="btn-outline fixed left-4 top-3 z-30 h-8 w-8 p-0 md:invisible md:pointer-events-none"
                        data-sidebar-open
                        aria-label="Show sidebar"
                        aria-controls="app-sidebar"
                        aria-expanded="false"
                    >
                        <i
                            class="icon-[tabler--menu-2] inline-block"
                            aria-hidden="true"
                        ></i>
                    </button>

                    <button
                        type="button"
                        class="btn-outline ml-auto relative -top-3 h-8 w-8 p-0"
                        data-theme-toggle
                        aria-pressed="true"
                        aria-label="Switch to light mode"
                        data-tooltip="Switch to light mode"
                    >
                        <i
                            class="icon-[tabler--moon] inline-block"
                            aria-hidden="true"
                        ></i>
                    </button>
                </header>

                <section
                    id="page-1"
                    data-page-section
                    data-page-partial="./pages/home.html"
                ></section>

                <section
                    id="page-2"
                    data-page-section
                    data-page-partial="./pages/lineaire-vergelijking.html"
                    hidden
                ></section>

                <section
                    id="page-3"
                    data-page-section
                    data-page-partial="./pages/cijfercalculator.html"
                    hidden
                ></section>

                <section
                    id="page-4"
                    data-page-section
                    data-page-partial="./pages/percentagecalculator.html"
                    hidden
                ></section>
            </main>
        </div>
    </body>
</html>
