<!doctype html>
<html lang="en" class="dark overflow-x-clip">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Eindproject</title>

        <!-- Favicon -->
        <link
            rel="icon"
            type="image/svg+xml"
            href="https://api.iconify.design/tabler/math-max-min.svg?color=%23ffffff"
        />

        <!-- Pyscript -->
        <link
            rel="stylesheet"
            href="https://pyscript.net/releases/2026.2.1/core.css"
        />
        <script
            type="module"
            src="https://pyscript.net/releases/2026.2.1/core.js"
        ></script>

        <!-- Css -->
        <link rel="stylesheet" href="./index.css" />
        <script type="module" src="./index.ts"></script>

        <!-- Scripts -->
        <py-script src="./py/loading.py" config="./pyscript.json"></py-script>
        <py-script
            src="./py/navigation.py"
            config="./pyscript.json"
        ></py-script>
        <py-script src="./py/settings.py" config="./pyscript.json"></py-script>
    </head>
    <body
        class="theme-transition overflow-x-clip transition-colors duration-500 ease-in-out motion-reduce:transition-none"
    >
        <div
            id="pyscript-loading"
            class="fixed bottom-2 left-1/2 z-40 -translate-x-1/2"
            role="status"
            aria-live="polite"
        >
            <span
                class="badge-secondary origin-bottom motion-safe:motion-preset-pop motion-safe:motion-translate-y-in-150 motion-safe:motion-duration-300"
            >
                <i
                    class="icon-[tabler--loader-2] inline-block animate-spin"
                    aria-hidden="true"
                ></i>
                Loading python
            </span>
        </div>

        <div id="app-shell" class="[--sidebar-width:14rem]">
            <aside
                id="app-sidebar"
                class="peer sidebar"
                data-side="left"
                data-sidebar-initialized
                aria-hidden="false"
            >
                <nav
                    class="flex h-full flex-col"
                    aria-label="Sidebar navigation"
                >
                    <div
                        class="flex items-center justify-start gap-2 px-3 pt-3"
                    >
                        <button
                            type="button"
                            class="btn-outline h-8 w-8 p-0"
                            data-sidebar-collapse
                            aria-label="Collapse sidebar"
                            aria-controls="app-sidebar"
                            aria-expanded="true"
                        >
                            <i
                                class="icon-[tabler--layout-sidebar-left-collapse] inline-block"
                                aria-hidden="true"
                            ></i>
                        </button>
                        <button
                            type="button"
                            class="btn-outline h-8 w-8 p-0"
                            data-sidebar-pin
                            aria-label="Pin sidebar"
                            aria-controls="app-sidebar"
                            aria-expanded="true"
                            hidden
                        >
                            <i
                                class="icon-[tabler--pin] inline-block"
                                aria-hidden="true"
                            ></i>
                        </button>
                        <p
                            class="hidden items-center gap-1 text-xs opacity-70 md:flex"
                        >
                            <i
                                class="icon-[tabler--git-commit] inline-block"
                                aria-hidden="true"
                            ></i>
                            <span>__GIT_COMMIT_HASH__</span>
                        </p>
                    </div>

                    <section class="scrollbar flex-1">
                        <div role="group" aria-labelledby="sidebar-pages-label">
                            <ul>
                                <li>
                                    <a
                                        class="flex min-w-0 items-center gap-2 px-3 py-2 motion-scale-in-90 motion-opacity-in-0 motion-duration-300 motion-ease-[cubic-bezier(0.2,0,0.9,1)] motion-reduce:motion-duration-0"
                                        data-nav-link
                                        data-page-id="home"
                                        data-page-label="Home"
                                        href="#home"
                                    >
                                        <i
                                            class="icon-[tabler--home] size-4"
                                            aria-hidden="true"
                                        ></i>
                                        <span class="flex-1 truncate"
                                            >Home</span
                                        >
                                    </a>
                                </li>
                            </ul>
                            <h3 id="sidebar-pages-label">Tools</h3>
                            <ul>
                                <li>
                                    <a
                                        class="flex min-w-0 items-center gap-2 px-3 py-2 motion-translate-x-in-[-10%] motion-translate-y-in-[-2%] motion-duration-500"
                                        data-nav-link
                                        data-page-id="lineaire-vergelijking-oplosser"
                                        data-page-label="Lineaire Vergelijking Oplosser"
                                        href="#lineaire-vergelijking-oplosser"
                                    >
                                        <i
                                            class="icon-[tabler--line] size-4"
                                            aria-hidden="true"
                                        ></i>
                                        <span class="flex-1 truncate"
                                            >Lineaire Vergelijking
                                            Oplosser</span
                                        >
                                    </a>
                                </li>
                                <li>
                                    <a
                                        class="flex min-w-0 items-center gap-2 px-3 py-2 motion-translate-x-in-[-10%] motion-translate-y-in-[-2%] motion-duration-800"
                                        data-nav-link
                                        data-page-id="cijfer-calculator"
                                        data-page-label="Cijfer Calculator"
                                        href="#cijfer-calculator"
                                    >
                                        <i
                                            class="icon-[tabler--file-text] size-4"
                                            aria-hidden="true"
                                        ></i>
                                        <span class="flex-1 truncate"
                                            >Cijfer Calculator</span
                                        >
                                    </a>
                                </li>
                                <li>
                                    <a
                                        class="flex min-w-0 items-center gap-2 px-3 py-2 motion-translate-x-in-[-10%] motion-translate-y-in-[-2%] motion-duration-1100"
                                        data-nav-link
                                        data-page-id="percentage-calculator"
                                        data-page-label="Percentage Calculator"
                                        href="#percentage-calculator"
                                    >
                                        <i
                                            class="icon-[tabler--circle-percentage] size-4"
                                            aria-hidden="true"
                                        ></i>
                                        <span class="flex-1 truncate"
                                            >Percentage Calculator</span
                                        >
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </section>

                    <div class="mt-auto px-3 pb-3">
                        <p
                            class="flex items-center justify-center gap-1 pb-2 text-xs opacity-70 md:hidden"
                        >
                            <i
                                class="icon-[tabler--git-commit] inline-block"
                                aria-hidden="true"
                            ></i>
                            <span>__GIT_COMMIT_HASH__</span>
                        </p>

                        <div class="flex items-center gap-2">
                            <article class="card min-w-0 flex-1 rounded-md p-0">
                                <section class="p-0">
                                    <h2
                                        class="m-0 px-3 py-2 text-sm leading-tight"
                                    >
                                        Rekentools
                                    </h2>
                                </section>
                            </article>

                            <div id="sidebar-settings-menu">
                                <button
                                    type="button"
                                    id="sidebar-settings-menu-trigger"
                                    aria-haspopup="dialog"
                                    aria-controls="sidebar-settings-dialog"
                                    aria-expanded="false"
                                    aria-label="Open settings"
                                    class="btn-icon-outline"
                                >
                                    <i
                                        class="icon-[tabler--settings]"
                                        aria-hidden="true"
                                    ></i>
                                </button>
                                <dialog
                                    id="sidebar-settings-dialog"
                                    class="dialog"
                                    aria-labelledby="sidebar-settings-dialog-title"
                                    aria-describedby="sidebar-settings-dialog-description"
                                >
                                    <div id="sidebar-settings-panel">
                                        <header>
                                            <h2
                                                id="sidebar-settings-dialog-title"
                                                class="inline-flex items-center gap-2"
                                            >
                                                Settings
                                            </h2>
                                            <p
                                                id="sidebar-settings-dialog-description"
                                            >
                                                Update your preferences and save
                                                when done.
                                            </p>
                                        </header>
                                        <section class="space-y-4">
                                            <div
                                                role="group"
                                                class="field"
                                                data-orientation="horizontal"
                                            >
                                                <label
                                                    for="settings-theme-select"
                                                    >Theme</label
                                                >
                                                <select
                                                    id="settings-theme-select"
                                                    class="select w-40"
                                                    aria-label="Theme"
                                                >
                                                    <option value="dark">
                                                        Dark
                                                    </option>
                                                    <option value="light">
                                                        Light
                                                    </option>
                                                </select>
                                            </div>
                                            <div
                                                role="group"
                                                class="field"
                                                data-orientation="horizontal"
                                            >
                                                <label
                                                    for="settings-sidebar-edge-hover-switch"
                                                    >Sidebar edge hover</label
                                                >
                                                <input
                                                    id="settings-sidebar-edge-hover-switch"
                                                    type="checkbox"
                                                    role="switch"
                                                    class="input"
                                                    checked
                                                    aria-checked="true"
                                                    aria-label="Sidebar edge hover"
                                                />
                                            </div>
                                        </section>
                                        <footer>
                                            <form method="dialog">
                                                <button
                                                    type="submit"
                                                    value="cancel"
                                                    class="btn-outline"
                                                >
                                                    Cancel
                                                </button>
                                                <button
                                                    type="submit"
                                                    value="save"
                                                    class="btn"
                                                >
                                                    Save
                                                </button>
                                            </form>
                                        </footer>
                                    </div>
                                </dialog>
                            </div>
                        </div>
                    </div>
                </nav>
            </aside>

            <main id="app-main" class="content-start space-y-6 p-4 md:p-6">
                <header class="flex min-h-4 items-start justify-between gap-4">
                    <button
                        type="button"
                        class="btn-outline fixed left-4 top-3 z-30 h-8 w-8 p-0 md:invisible md:pointer-events-none"
                        data-sidebar-open
                        aria-label="Show sidebar"
                        aria-controls="app-sidebar"
                        aria-expanded="false"
                    >
                        <i
                            class="icon-[tabler--menu-2] inline-block"
                            aria-hidden="true"
                        ></i>
                    </button>

                    <button
                        type="button"
                        class="btn-outline fixed right-4 top-3 z-30 h-8 w-8 p-0 md:right-6"
                        data-theme-toggle
                        aria-pressed="true"
                        aria-label="Switch to light mode"
                        data-side="bottom"
                        data-tooltip="Switch to light mode"
                    >
                        <span
                            class="pointer-events-none relative inline-flex size-4 items-center justify-center"
                            aria-hidden="true"
                        >
                            <i
                                class="icon-[tabler--sun] absolute inset-0 m-auto inline-block scale-100 rotate-0 opacity-100 transition-all! duration-300! ease-in-out! dark:scale-0 dark:-rotate-90 dark:opacity-0 motion-reduce:transition-none"
                            ></i>
                            <i
                                class="icon-[tabler--moon] absolute inset-0 m-auto inline-block scale-0 rotate-90 opacity-0 transition-all! duration-300! ease-in-out! dark:scale-100 dark:rotate-0 dark:opacity-100 motion-reduce:transition-none"
                            ></i>
                        </span>
                    </button>
                </header>

                <section
                    id="home"
                    data-page-section
                    data-page-partial="./pages/home.html"
                ></section>

                <section
                    id="lineaire-vergelijking-oplosser"
                    data-page-section
                    data-page-partial="./pages/lineaire-vergelijking-oplosser.html"
                    hidden
                ></section>

                <section
                    id="cijfer-calculator"
                    data-page-section
                    data-page-partial="./pages/cijfer-calculator.html"
                    hidden
                ></section>

                <section
                    id="percentage-calculator"
                    data-page-section
                    data-page-partial="./pages/percentage-calculator.html"
                    hidden
                ></section>
            </main>
        </div>
    </body>
</html>
