<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Basecoat Single Page POC</title>

        <!-- Stylesheets -->
        <link rel="stylesheet" href="./index.css" />
        <link
            rel="stylesheet"
            href="https://pyscript.net/releases/2026.1.1/core.css"
        />

        <!-- Scripts -->
        <script
            type="module"
            src="https://pyscript.net/releases/2026.1.1/core.js"
        ></script>
        <script
            type="py"
            src="./py/navigation.py"
            config="./pyscript.json"
        ></script>
    </head>
    <body class="min-h-screen">
        <div class="grid min-h-screen md:grid-cols-[18rem_1fr]">
            <aside
                class="sidebar border-r"
                data-side="left"
                aria-hidden="false"
            >
                <nav aria-label="Sidebar navigation" class="h-full p-4">
                    <header class="card">
                        <section>
                            <h2>Basecoat POC</h2>
                            <p>Single page + PyScript navigation</p>
                        </section>
                    </header>

                    <section class="scrollbar mt-4">
                        <div role="group" aria-labelledby="sidebar-pages-label">
                            <h3 id="sidebar-pages-label">Pages</h3>
                            <ul>
                                <li>
                                    <a
                                        data-nav-link
                                        data-page-id="page-1"
                                        data-page-label="Page 1"
                                        href="#page-1"
                                        >Page 1</a
                                    >
                                </li>
                                <li>
                                    <a
                                        data-nav-link
                                        data-page-id="page-2"
                                        data-page-label="Page 2"
                                        href="#page-2"
                                        >Page 2</a
                                    >
                                </li>
                                <li>
                                    <a
                                        data-nav-link
                                        data-page-id="page-3"
                                        data-page-label="Page 3"
                                        href="#page-3"
                                        >Page 3</a
                                    >
                                </li>
                                <li>
                                    <a
                                        data-nav-link
                                        data-page-id="page-4"
                                        data-page-label="Page 4"
                                        href="#page-4"
                                        >Page 4</a
                                    >
                                </li>
                            </ul>
                        </div>
                    </section>
                </nav>
            </aside>

            <main class="space-y-6 p-4 md:p-6">
                <header class="space-y-1">
                    <h1>Basecoat Components Proof of Concept</h1>
                    <p>Current page: <span data-current-page>Page 1</span></p>
                </header>

                <section
                    id="page-1"
                    data-page-section
                    class="space-y-4"
                ></section>

                <section
                    id="page-2"
                    data-page-section
                    class="hidden space-y-4"
                ></section>

                <section
                    id="page-3"
                    data-page-section
                    class="hidden space-y-4"
                ></section>

                <section
                    id="page-4"
                    data-page-section
                    class="hidden space-y-4"
                ></section>
            </main>
        </div>
    </body>
</html>
