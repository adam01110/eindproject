<div class="tabs fixed left-1/2 top-2 z-20 -translate-x-1/2">
    <div role="tablist" aria-label="Cijfer calculator tabs" class="p-0.5">
        <button
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="cijfercalculator-tool-panel"
            tabindex="0"
            class="h-full w-30 leading-none"
        >
            Tool
        </button>
        <button
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="cijfercalculator-history-panel"
            tabindex="-1"
            class="h-full w-30 leading-none"
        >
            History
        </button>
    </div>
</div>

<section id="cijfercalculator-tool-panel" role="tabpanel">
    <!-- Oh my fucking god, what the fuck tailwind. -->
    <div
        class="grid gap-4 lg:grid-cols-[calc((100%-1rem)/2+1.125rem)_calc((100%-1rem)/2-1.125rem)]"
    >
        <article class="card">
            <section>
                <h2>cijfercalculator</h2>
                <p>
                    You can keep adding Basecoat markup here without growing the
                    main entry file.
                </p>
            </section>
        </article>
        <article class="card">
            <section>
                <h2>cijfercalculator tools</h2>
                <p>Use this second card for extra controls or quick notes.</p>
            </section>
        </article>
    </div>
</section>

<section id="cijfercalculator-history-panel" role="tabpanel" hidden>
    <article class="card">
        <section>
            <h2>cijfercalculator history</h2>
            <p>No history yet.</p>
        </section>
    </article>
</section>
