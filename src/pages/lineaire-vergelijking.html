<div class="tabs fixed left-1/2 top-2 z-20 -translate-x-1/2">
    <div
        role="tablist"
        aria-label="Lineaire vergelijking tabs"
        class="p-0.5"
    >
        <button
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="lineaire-vergelijking-tool-panel"
            tabindex="0"
            class="h-full leading-none"
        >
            Tool
        </button>
        <button
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="lineaire-vergelijking-history-panel"
            tabindex="-1"
            class="h-full leading-none"
        >
            History
        </button>
    </div>
</div>

<section id="lineaire-vergelijking-tool-panel" role="tabpanel">
    <article class="card">
        <section>
            <h2>lineaire vergelijking</h2>
            <p>
                This file is loaded at runtime by PyScript and injected into the
                matching section.
            </p>
        </section>
    </article>
</section>

<section id="lineaire-vergelijking-history-panel" role="tabpanel" hidden>
    <article class="card">
        <section>
            <h2>lineaire vergelijking history</h2>
            <p>No history yet.</p>
        </section>
    </article>
</section>
