<py-script
    src="./py/lineaire-vergelijking-oplosser.py"
    config="./pyscript.json"
></py-script>

<div class="tabs fixed left-1/2 top-2 z-20 -translate-x-1/2">
    <div
        role="tablist"
        aria-label="Lineaire vergelijking oplosser tabs"
        class="p-0.5 gap-1"
    >
        <button
            type="button"
            id="lineaire-vergelijking-oplosser-tool-tab"
            role="tab"
            aria-selected="true"
            aria-controls="lineaire-vergelijking-oplosser-tool-panel"
            tabindex="0"
            class="h-full w-30 leading-none"
        >
            <i class="icon-[tabler--tool] size-4" aria-hidden="true"></i>
            Tool
        </button>
        <button
            type="button"
            id="lineaire-vergelijking-oplosser-history-tab"
            role="tab"
            aria-selected="false"
            aria-controls="lineaire-vergelijking-oplosser-history-panel"
            tabindex="-1"
            class="h-full w-30 leading-none"
        >
            <i class="icon-[tabler--history] size-4" aria-hidden="true"></i>
            History
        </button>
    </div>
</div>

<section id="lineaire-vergelijking-oplosser-tool-panel" role="tabpanel">
    <!-- Oh my fucking god, what the fuck tailwind. -->
    <div
        class="grid gap-4 lg:grid-cols-[calc((100%-1rem)/2+0.375rem)_calc((100%-1rem)/2-0.375rem)] lg:[#app-sidebar[aria-hidden=false]_~_main_&]:grid-cols-[calc((100%-1rem)/2+1.25rem)_calc((100%-1rem)/2-1.25rem)]"
    >
        <article class="card min-h-157.5">
            <section class="flex h-full flex-col">
                <h2 class="mb-2">Output</h2>
                <p class="text-base-content/70">
                    Bekijk direct de oplossing, de ingevulde waarden en hoe de
                    vergelijking is omgezet naar x.
                </p>
                <div id="lineaire-vergelijking-result" class="mt-4 flex-1">
                    <div
                        class="flex h-full min-h-96 items-center justify-center rounded-xl border border-dashed border-border/70 bg-background/60 p-6 text-center text-base-content/60"
                    >
                        Vul waarden in en klik op berekenen.
                    </div>
                </div>
            </section>
        </article>
        <article class="card">
            <section>
                <div class="flex items-start justify-between gap-3">
                    <h2 class="mb-2">Input</h2>
                    <span class="badge-outline whitespace-nowrap"
                        >y = ax + b</span
                    >
                </div>
                <form
                    class="space-y-4"
                    aria-label="Lineaire vergelijking invoer"
                >
                    <div class="field">
                        <div class="flex items-center gap-2">
                            <i
                                class="icon-[tabler--circle-letter-a] size-5 mr-1"
                                aria-hidden="true"
                            ></i>
                            <input
                                id="lineaire-vergelijking-a"
                                name="a"
                                type="number"
                                inputmode="decimal"
                                class="input w-full [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none"
                                aria-label="a"
                                placeholder="Voer a in."
                            />
                        </div>
                    </div>
                    <div class="field">
                        <div class="flex items-center gap-2">
                            <i
                                class="icon-[tabler--circle-letter-b] size-5 mr-1"
                                aria-hidden="true"
                            ></i>
                            <input
                                id="lineaire-vergelijking-b"
                                name="b"
                                type="number"
                                inputmode="decimal"
                                class="input w-full [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none"
                                aria-label="b"
                                placeholder="Voer b in."
                            />
                        </div>
                    </div>
                    <div class="field mt-8">
                        <div class="flex items-center gap-2">
                            <i
                                class="icon-[tabler--circle-letter-y] size-5 mr-1"
                                aria-hidden="true"
                            ></i>
                            <input
                                id="lineaire-vergelijking-y"
                                name="y"
                                type="number"
                                inputmode="decimal"
                                class="input w-full [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none"
                                aria-label="y"
                                placeholder="Voer y in."
                            />
                        </div>
                    </div>
                </form>
                <div class="mt-4 flex justify-center gap-2">
                    <button
                        type="button"
                        id="lineaire-vergelijking-berekenen"
                        class="btn"
                    >
                        Berekenen
                    </button>
                    <button
                        type="button"
                        id="lineaire-vergelijking-reset"
                        class="btn-destructive"
                    >
                        Reset
                    </button>
                </div>
            </section>
        </article>
    </div>
</section>

<section
    id="lineaire-vergelijking-oplosser-history-panel"
    role="tabpanel"
    hidden
>
    <div
        id="lineaire-vergelijking-history-empty"
        class="mb-3 flex w-full justify-center transition-transform duration-200 ease-in-out motion-reduce:transition-none md:[#app-sidebar[aria-hidden=false]_~_main_&]:-translate-x-28"
    >
        <article
            class="card w-full max-w-sm py-3 text-center text-base-content/60"
        >
            <p>Nog geen geschiedenis.</p>
        </article>
    </div>
    <div
        id="lineaire-vergelijking-history-list"
        class="flex flex-col gap-3"
    ></div>
</section>
