<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace - Page 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/basecoat.cdn.min.css">
  <link rel="stylesheet" href="https://pyscript.net/releases/2026.1.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2026.1.1/core.js"></script>
  <style>
    body {
      font-family: "Manrope", sans-serif;
    }

    @keyframes fade-slide {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .animate-fade-slide {
      animation: fade-slide 520ms ease-out both;
    }

    .animate-fade-in {
      animation: fade-in 700ms ease-out both;
    }
  </style>
</head>
<body class="min-h-screen bg-stone-100 text-stone-900">
  <div class="relative isolate overflow-hidden">
    <div class="pointer-events-none absolute -left-20 -top-20 h-72 w-72 rounded-full bg-teal-200/40 blur-3xl"></div>
    <div class="pointer-events-none absolute -right-24 top-44 h-96 w-96 rounded-full bg-sky-200/35 blur-3xl"></div>

    <div class="relative mx-auto flex min-h-screen w-full max-w-7xl flex-col md:flex-row">
      <aside class="animate-fade-slide border-b border-stone-300 bg-white/85 backdrop-blur-md md:h-screen md:w-72 md:border-b-0 md:border-r">
        <div class="flex h-full flex-col p-4 md:p-6">
          <div class="rounded-xl border border-stone-300 bg-stone-100 p-4">
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-stone-500">Shadcn Style</p>
            <h1 class="mt-2 text-lg font-semibold text-stone-900">Basecoat + Tailwind</h1>
          </div>

          <nav aria-label="Sidebar navigation" class="mt-4 grid grid-cols-2 gap-2 md:grid-cols-1">
            <a data-nav-link data-page-label="Page 1" href="./index.html" class="rounded-lg border border-stone-300 bg-white px-3 py-2.5 text-sm font-medium text-stone-700 transition hover:border-stone-400 hover:bg-stone-100">Page 1</a>
            <a data-nav-link data-page-label="Page 2" href="./page-2.html" class="rounded-lg border border-stone-300 bg-white px-3 py-2.5 text-sm font-medium text-stone-700 transition hover:border-stone-400 hover:bg-stone-100">Page 2</a>
            <a data-nav-link data-page-label="Page 3" href="./page-3.html" class="rounded-lg border border-stone-300 bg-white px-3 py-2.5 text-sm font-medium text-stone-700 transition hover:border-stone-400 hover:bg-stone-100">Page 3</a>
            <a data-nav-link data-page-label="Page 4" href="./page-4.html" class="rounded-lg border border-stone-300 bg-white px-3 py-2.5 text-sm font-medium text-stone-700 transition hover:border-stone-400 hover:bg-stone-100">Page 4</a>
          </nav>
        </div>
      </aside>

      <main class="animate-fade-in flex-1 p-4 md:p-10">
        <header class="mb-6 md:mb-10">
          <p class="text-xs font-semibold uppercase tracking-[0.2em] text-stone-500">Current page</p>
          <h2 data-current-page class="mt-2 text-3xl font-semibold text-stone-900 md:text-4xl">Page 3</h2>
        </header>

        <section class="h-[58vh] rounded-2xl border-2 border-dashed border-stone-300 bg-white/70"></section>
      </main>
    </div>
  </div>

  <script type="py" src="./py/navigation.py"></script>
</body>
</html>
